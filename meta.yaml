{% set version = "0.1.1" %}

package:
  name: spacecurves
  version: {{ version }}

source:
  path: .  # Derlemeyi bu meta.yaml dosyasının bulunduğu dizinden yap
  url: 
  blake2b-256: 

channels:
  - conda-forge

build:
  noarch: python  # Platformdan bağımsız bir paket oluşturur
  #script: "{{ PYTHON }} -m pip install . --no-deps --ignore-installed"
  script: "{{ PYTHON }} -m pip install . -vv"
  number: 0
  entry_points:
    - spacecurves = spacecurves.__main__:main

requirements:
  host:
    - python {{ python }}
    - numpy
    - setuptools
    # Other build tools
  run:
    - python >=3.11
    - numpy
    # Other runtime dependencies
  build:
    - python >=3.11
    - pip
    - setuptools
    - numpy

test:
  requires:
    - numpy
  imports:
    - numpy

about:
  home: https://github.com/WhiteSymmetry/spacecurves
  license: AGPL-3.0-or-later
  summary: 'Space Curves (spacecurves, Uzay Eğrileri): Uzay Dolduran Eğriler Modülü'
  description: |
    Space Curves (spacecurves, Uzay Eğrileri): Uzay Dolduran Eğriler Modülü
  dev_url: https://github.com/WhiteSymmetry/spacecurves
  doc_url: https://github.com/WhiteSymmetry/spacecurves
  doc_source_url: https://github.com/WhiteSymmetry/spacecurves/blob/main/README.md

